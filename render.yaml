services:
  - type: web
    name: atticusmini
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./AT_frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: unsafe-none
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_BYBIT_TESTNET
        value: "false"
